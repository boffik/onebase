name: Admin
title: Служебное API (требует Basic-аутентификации)
# auth: basic — HTTP Basic против пользователей информационной базы. После
# успешной проверки ТекущийПользователь()/ИмяПользователя() и журнал аудита
# видят вызывающего, а запись справочника идёт от его имени.
#   curl -u ivan:secret -X POST http://localhost:8080/hs/admin/номенклатура \
#        -d '{"наименование":"Новый товар","артикул":"АРТ-100"}'
root_url: admin
auth: basic
# roles — вызов разрешён только пользователю с ролью «Менеджер» (или админу).
# Анонимный/неподходящий пользователь получает 403.
roles: [Менеджер]
templates:
  - template: /номенклатура
    methods:
      POST: СоздатьНоменклатуру
