name: МинимальныеОстатки
title: Товары ниже минимального остатка
params:
  - name: Склад
    type: reference:Склад
    label: Склад
query: |
  ВЫБРАТЬ
    Номенклатура, Склад,
    СУММА(Количество) КАК ФактическийОстаток
  ИЗ РегистрНакопления.ОстаткиТоваров
  ГДЕ (&Склад ЕСТЬ ПУСТО ИЛИ Склад = &Склад)
  СГРУППИРОВАТЬ ПО Номенклатура, Склад
  УПОРЯДОЧИТЬ ПО ФактическийОстаток
