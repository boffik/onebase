name: ДвиженияТоваров
title: Движения товаров
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
  - name: Номенклатура
    type: reference:Номенклатура
    label: Номенклатура
  - name: Склад
    type: reference:Склад
    label: Склад
query: |
  ВЫБРАТЬ
    Номенклатура, Склад,
    СУММА(Количество) КАК Количество,
    СУММА(Сумма) КАК Сумма
  ИЗ РегистрНакопления.ОстаткиТоваров
  ГДЕ (&Начало ЕСТЬ ПУСТО ИЛИ period >= &Начало)
    И (&Конец ЕСТЬ ПУСТО ИЛИ period <= &Конец)
    И (&Номенклатура ЕСТЬ ПУСТО ИЛИ Номенклатура = &Номенклатура)
    И (&Склад ЕСТЬ ПУСТО ИЛИ Склад = &Склад)
  СГРУППИРОВАТЬ ПО Номенклатура, Склад
  УПОРЯДОЧИТЬ ПО Номенклатура
