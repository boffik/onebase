name: ВедомостьПартий
title: Ведомость партий (ФИФО)
params:
  - name: НаДату
    type: date
    label: На дату
  - name: Склад
    type: reference:Склад
    label: Склад
query: |
  ВЫБРАТЬ
    Номенклатура, Склад, ДатаПоставки,
    СУММА(Количество) КАК Количество,
    СУММА(Сумма) КАК Сумма
  ИЗ РегистрНакопления.ПартииТоваров
  ГДЕ (&НаДату ЕСТЬ ПУСТО ИЛИ period <= &НаДату)
    И (&Склад ЕСТЬ ПУСТО ИЛИ Склад = &Склад)
  СГРУППИРОВАТЬ ПО Номенклатура, Склад, ДатаПоставки
  ИМЕЯ СУММА(Количество) > 0
  УПОРЯДОЧИТЬ ПО ДатаПоставки
