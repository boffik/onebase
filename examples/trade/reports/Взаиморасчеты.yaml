name: Взаиморасчеты
title: Взаиморасчеты с контрагентами
params:
  - name: Контрагент
    type: reference:Контрагент
    label: Контрагент
  - name: НаДату
    type: date
    label: На дату
query: |
  ВЫБРАТЬ
    Контрагент,
    СУММА(Сумма) КАК Остаток
  ИЗ РегистрНакопления.Взаиморасчеты
  ГДЕ (&Контрагент ЕСТЬ ПУСТО ИЛИ Контрагент = &Контрагент)
    И (&НаДату ЕСТЬ ПУСТО ИЛИ period <= &НаДату)
  СГРУППИРОВАТЬ ПО Контрагент
  УПОРЯДОЧИТЬ ПО Остаток УБЫВ
