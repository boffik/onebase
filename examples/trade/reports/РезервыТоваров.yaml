name: РезервыТоваров
title: Резервы товаров
params:
  - name: НаДату
    type: date
    label: На дату
query: |
  ВЫБРАТЬ
    Номенклатура, Склад, ЗаказПокупателя,
    СУММА(Количество) КАК Количество
  ИЗ РегистрНакопления.РезервыТоваров
  ГДЕ (&НаДату ЕСТЬ ПУСТО ИЛИ period <= &НаДату)
  СГРУППИРОВАТЬ ПО Номенклатура, Склад, ЗаказПокупателя
  ИМЕЯ СУММА(Количество) > 0
  УПОРЯДОЧИТЬ ПО Номенклатура
