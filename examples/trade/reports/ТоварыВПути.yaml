name: ТоварыВПути
title: Товары в пути
params:
  - name: НаДату
    type: date
    label: На дату
query: |
  ВЫБРАТЬ
    Номенклатура, ЗаказПоставщику, СкладНазначения, ОжидаемаяДата,
    СУММА(Количество) КАК Количество,
    СУММА(Сумма) КАК Сумма
  ИЗ РегистрНакопления.ТоварыВПути
  ГДЕ (&НаДату ЕСТЬ ПУСТО ИЛИ period <= &НаДату)
  СГРУППИРОВАТЬ ПО Номенклатура, ЗаказПоставщику, СкладНазначения, ОжидаемаяДата
  ИМЕЯ СУММА(Количество) > 0
  УПОРЯДОЧИТЬ ПО ОжидаемаяДата
