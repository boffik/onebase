name: Оборачиваемость
title: Оборачиваемость запасов
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
  - name: Склад
    type: reference:Склад
    label: Склад
query: |
  ВЫБРАТЬ
    Номенклатура,
    СУММА(Количество) КАК Оборот,
    СУММА(Сумма) КАК ОборотСумма
  ИЗ РегистрНакопления.ОстаткиТоваров
  ГДЕ ВидДвижения = 'Расход'
    И (&Начало ЕСТЬ ПУСТО ИЛИ period >= &Начало)
    И (&Конец ЕСТЬ ПУСТО ИЛИ period <= &Конец)
    И (&Склад ЕСТЬ ПУСТО ИЛИ Склад = &Склад)
  СГРУППИРОВАТЬ ПО Номенклатура
  УПОРЯДОЧИТЬ ПО ОборотСумма УБЫВ
