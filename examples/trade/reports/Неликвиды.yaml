name: Неликвиды
title: Неликвиды (нет движения более 90 дней)
params:
  - name: Дней
    type: number
    label: "Дней без движения"
  - name: Склад
    type: reference:Склад
    label: Склад
query: |
  ВЫБРАТЬ
    Номенклатура, Склад,
    СУММА(Количество) КАК Количество,
    СУММА(Сумма) КАК Сумма
  ИЗ РегистрНакопления.ОстаткиТоваров
  ГДЕ (&Склад ЕСТЬ ПУСТО ИЛИ Склад = &Склад)
  СГРУППИРОВАТЬ ПО Номенклатура, Склад
  ИМЕЯ СУММА(Количество) > 0
  УПОРЯДОЧИТЬ ПО Сумма УБЫВ
