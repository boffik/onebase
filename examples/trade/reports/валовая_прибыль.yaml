name: ВаловаяПрибыль
title: Отчёт по валовой прибыли (ФИФО)
params:
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
  - name: Номенклатура
    type: reference:Номенклатура
    label: "Номенклатура"
query: |
  ВЫБРАТЬ
    Номенклатура,
    СУММА(Выручка)       КАК Выручка,
    СУММА(Себестоимость) КАК Себестоимость,
    СУММА(Выручка) - СУММА(Себестоимость) КАК ВаловаяПрибыль
  ИЗ РегистрНакопления.ВаловаяПрибыль
  ГДЕ (&Начало ЕСТЬ ПУСТО ИЛИ period >= &Начало)
    И (&Конец ЕСТЬ ПУСТО ИЛИ period <= &Конец)
    И (&Номенклатура ЕСТЬ ПУСТО ИЛИ Номенклатура = &Номенклатура)
  СГРУППИРОВАТЬ ПО Номенклатура
  УПОРЯДОЧИТЬ ПО ВаловаяПрибыль УБЫВ
chart_proc: СформироватьДиаграмму
