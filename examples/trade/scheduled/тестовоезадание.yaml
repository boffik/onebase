name: ТестовоеЗадание
title: Тестовый пересчёт цен (каждую минуту)
schedule: "*/1 * * * *"
processor: ПересчётЦен
params:
  Процент: 5
# Демо-задание оставлено как пример регламентного запуска, но выключено по
# умолчанию: иначе каждую минуту его Сообщить() попадает в общую панель
# сообщений и выглядит как реакция на обычные действия в интерфейсе.
enabled: false
on_error: continue
timeout: 60
