name: ПрибыльПоМесяцам
type: chart
title: Продажи по месяцам
chart_kind: bar
params:
  Начало: "{{today|-180d}}"
query: |
  ВЫБРАТЬ Дата, CAST(СУММА(Сумма) AS INTEGER) КАК Сумма
  ИЗ Документ.РеализацияТоваров
  ГДЕ Дата >= &Начало
  СГРУППИРОВАТЬ ПО Дата
  УПОРЯДОЧИТЬ ПО Дата
x_field: Дата
y_fields: [Сумма]
