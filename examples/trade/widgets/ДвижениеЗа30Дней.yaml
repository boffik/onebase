name: ДвижениеЗа30Дней
type: chart
title: Приход/Расход за 30 дней
chart_type: line
params:
  Начало: "{{today|-30d}}"
query: |
  ВЫБРАТЬ
    period КАК Дата,
    СУММА(Количество) КАК Количество
  ИЗ РегистрНакопления.ОстаткиТоваров
  ГДЕ period >= &Начало
    И Количество > 0
  СГРУППИРОВАТЬ ПО period
  УПОРЯДОЧИТЬ ПО period
