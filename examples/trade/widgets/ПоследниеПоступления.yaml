name: ПоследниеПоступления
type: list
title: Последние поступления
query: |
  ВЫБРАТЬ Дата, Поставщик, Склад, Сумма
  ИЗ Документ.ПоступлениеТоваров
  УПОРЯДОЧИТЬ ПО Дата УБЫВ
limit: 10
columns:
  - field: Дата
    label: Дата
    format: date
  - field: Поставщик
    label: Поставщик
  - field: Склад
    label: Склад
  - field: Сумма
    label: Сумма
