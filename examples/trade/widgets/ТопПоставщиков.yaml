name: ТопПоставщиков
type: chart
title: Топ поставщиков
chart_kind: bar
query: |
  ВЫБРАТЬ Контрагент, CAST(СУММА(Сумма) AS INTEGER) КАК Сумма
  ИЗ РегистрНакопления.Взаиморасчеты
  ГДЕ вид_движения = 'Расход'
  СГРУППИРОВАТЬ ПО Контрагент
  УПОРЯДОЧИТЬ ПО Сумма УБЫВ
x_field: Контрагент
y_fields: [Сумма]
