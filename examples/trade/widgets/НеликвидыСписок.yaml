name: НеликвидыСписок
type: list
title: Неликвиды
query: |
  ВЫБРАТЬ Номенклатура, СУММА(Количество) КАК Количество, CAST(СУММА(Сумма) AS INTEGER) КАК Сумма
  ИЗ РегистрНакопления.ОстаткиТоваров
  СГРУППИРОВАТЬ ПО Номенклатура
  УПОРЯДОЧИТЬ ПО Сумма УБЫВ
limit: 15
columns:
  - field: Номенклатура
    label: Товар
  - field: Количество
    label: Кол-во
  - field: Сумма
    label: Сумма
