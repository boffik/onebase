name: ДинамикаПродаж
type: chart
title: Продажи за 30 дней
chart_kind: line
params:
  Начало: "{{today|-30d}}"
query: |
  ВЫБРАТЬ period КАК Дата, СУММА(Сумма) КАК Сумма
  ИЗ РегистрНакопления.Взаиморасчеты
  ГДЕ period >= &Начало
    И вид_движения = 'Приход'
  СГРУППИРОВАТЬ ПО period
  УПОРЯДОЧИТЬ ПО period
x_field: Дата
y_fields: [Сумма]
