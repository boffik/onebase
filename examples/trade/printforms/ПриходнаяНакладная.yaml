name: ПриходнаяНакладная
document: ПоступлениеТоваров
title: "Приходная накладная № {{Номер}} от {{Дата | date}}"
header: |
  **Поставщик**: {{Поставщик.Наименование}}

  **Склад**: {{Склад.Наименование}}

table:
  source: Товары
  columns:
    - field: "@row"
      label: "№"
      width: 40px
    - field: Номенклатура.Наименование
      label: Наименование
    - field: Количество
      label: Кол-во
      align: right
    - field: Цена
      label: Цена
      align: right
      format: "number:2"
    - field: Сумма
      label: Сумма
      align: right
      format: "number:2"
  totals:
    - field: Сумма
      sum: true
      label: "Итого"
footer: |
  ___

  **Всего**: {{Сумма | money}} руб., в т.ч. НДС: {{СуммаНДС | money}} руб.

  ___

  Сдал: _________________________ Принял: _________________________
