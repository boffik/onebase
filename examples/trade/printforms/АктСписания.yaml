name: АктСписания
document: СписаниеТоваров
title: "Акт списания № {{Номер}} от {{Дата | date}}"
header: |
  **Склад**: {{Склад.Наименование}}

  **Причина**: {{ПричинаСписания}}

table:
  source: Товары
  columns:
    - field: "@row"
      label: "№"
      width: 40px
    - field: Номенклатура.Наименование
      label: Наименование
    - field: Количество
      label: Кол-во
      align: right
    - field: Себестоимость
      label: Себестоимость
      align: right
      format: "number:2"
  totals:
    - field: Себестоимость
      sum: true
      label: "Итого"
footer: |
  ___

  Члены комиссии: _________________________
