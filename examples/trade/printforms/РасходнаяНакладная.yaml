name: РасходнаяНакладная
document: РеализацияТоваров
title: "Расходная накладная № {{Номер}} от {{Дата | date}}"
header: |
  **Покупатель**: {{Покупатель.Наименование}}

  **Склад**: {{Склад.Наименование}}

table:
  source: Товары
  columns:
    - field: "@row"
      label: "№"
      width: 40px
    - field: Номенклатура.Наименование
      label: Наименование
    - field: Количество
      label: Кол-во
      align: right
    - field: Цена
      label: Цена
      align: right
      format: "number:2"
    - field: Сумма
      label: Сумма
      align: right
      format: "number:2"
  totals:
    - field: Сумма
      sum: true
      label: "Итого"
footer: |
  ___

  **Без НДС**: {{СуммаБезНДС | money}} руб. | **НДС**: {{СуммаНДС | money}} руб. | **Всего**: {{Сумма | money}} руб.

  ___

  Отпустил: _________________________ Получил: _________________________
