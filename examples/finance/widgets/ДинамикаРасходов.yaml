name: ДинамикаРасходов
type: chart
title: Доходы и расходы за 30 дней
chart_type: line
params:
  Начало: "{{today|-30d}}"
query: |
  ВЫБРАТЬ
    period КАК Дата,
    CAST(СУММА(Сумма) AS INTEGER) КАК Сумма
  ИЗ РегистрНакопления.ДвижениеСредств
  ГДЕ period >= &Начало
  СГРУППИРОВАТЬ ПО period
  УПОРЯДОЧИТЬ ПО period
