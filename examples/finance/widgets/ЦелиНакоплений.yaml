name: ЦелиНакоплений
type: list
title: Цели накоплений
query: |
  ВЫБРАТЬ Цель, CAST(СУММА(Сумма) AS INTEGER) КАК Накоплено
  ИЗ РегистрНакопления.НакопленияПоЦелям
  СГРУППИРОВАТЬ ПО Цель
  УПОРЯДОЧИТЬ ПО Накоплено УБЫВ
columns:
  - field: Цель
    label: Цель
  - field: Накоплено
    label: Накоплено
