name: СвободныеСредства
type: kpi
title: Свободные средства
format: number
params:
  Начало: "{{today|start_of_month}}"
query: |
  ВЫБРАТЬ
    CAST(СУММА(CASE WHEN ТипОперации = 'Приход' THEN Сумма ELSE 0 END) -
    СУММА(CASE WHEN ТипОперации = 'Расход' THEN Сумма ELSE 0 END) AS INTEGER) КАК Значение
  ИЗ РегистрНакопления.ДвижениеСредств
  ГДЕ period >= &Начало
