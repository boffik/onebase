name: ТопКатегорииРасходов
type: list
title: Топ категорий расходов
params:
  Начало: "{{today|start_of_month}}"
query: |
  ВЫБРАТЬ КатегорияРасхода, CAST(СУММА(Сумма) AS INTEGER) КАК Сумма
  ИЗ Документ.Расход
  ГДЕ Дата >= &Начало
  СГРУППИРОВАТЬ ПО КатегорияРасхода
  УПОРЯДОЧИТЬ ПО Сумма УБЫВ
limit: 10
columns:
  - field: КатегорияРасхода
    label: Категория
  - field: Сумма
    label: Сумма
