schema: onebase.form/v1
form:
  name: ФормаОбъекта
  kind: object
  entity: ПополнениеЦели
  title:
    ru: "Пополнение цели"
    en: "Savings deposit"
  auto_save_settings: true
attributes:
  - name: Объект
    type: DocumentRef.ПополнениеЦели
    save: true
    main: true
elements:
  - kind: ГруппаФормы
    name: ГруппаОсновное
    title:
      ru: "Параметры пополнения"
    children:
      - kind: ПолеВвода
        name: ПолеДата
        title:
          ru: "Дата"
        data_path: Объект.Дата
        required: true
      - kind: ПолеВвода
        name: ПолеЦель
        title:
          ru: "Цель накопления"
        data_path: Объект.Цель
        required: true
        choice: true
      - kind: ПолеВвода
        name: ПолеСчёт
        title:
          ru: "Счёт"
        data_path: Объект.Счёт
        required: true
        choice: true
      - kind: ПолеВвода
        name: ПолеСумма
        title:
          ru: "Сумма"
        data_path: Объект.Сумма
        required: true
      - kind: ПолеВвода
        name: ПолеОписание
        title:
          ru: "Описание"
        data_path: Объект.Описание
events:
  ПриОткрытии: ПриОткрытииФормы
  ПередЗаписью: ПередЗаписьюФормы
