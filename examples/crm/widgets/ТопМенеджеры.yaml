name: ТопМенеджеры
type: list
title: Топ менеджеров по сделкам
query: |
  ВЫБРАТЬ
    Ответственный.Наименование КАК Менеджер,
    КОЛИЧЕСТВО(*) КАК КоличествоСделок,
    CAST(СУММА(Сумма) AS INTEGER) КАК СуммаСделок
  ИЗ Документ.Сделка
  ГДЕ Результат = 'Выиграна'
  СГРУППИРОВАТЬ ПО Ответственный.Наименование
  УПОРЯДОЧИТЬ ПО СуммаСделок УБЫВ
limit: 10
columns:
  - field: Менеджер
    label: Менеджер
  - field: КоличествоСделок
    label: Сделок
  - field: СуммаСделок
    label: Сумма
