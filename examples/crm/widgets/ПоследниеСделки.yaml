name: ПоследниеСделки
type: list
title: Последние сделки
query: |
  ВЫБРАТЬ Дата, Заголовок, Клиент.Наименование КАК Клиент, Сумма, Стадия.Наименование КАК Стадия
  ИЗ Документ.Сделка
  УПОРЯДОЧИТЬ ПО Дата УБЫВ
limit: 15
columns:
