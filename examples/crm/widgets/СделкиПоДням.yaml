name: СделкиПоДням
type: chart
title: Сделки за 30 дней
chart_type: line
params:
  Начало: "{{today|-30d}}"
query: |
  ВЫБРАТЬ
    Дата,
    КОЛИЧЕСТВО(*) КАК Количество,
    CAST(СУММА(Сумма) AS INTEGER) КАК Сумма
  ИЗ Документ.Сделка
  ГДЕ Дата >= &Начало
  СГРУППИРОВАТЬ ПО Дата
  УПОРЯДОЧИТЬ ПО Дата
