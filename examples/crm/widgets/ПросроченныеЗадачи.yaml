name: ПросроченныеЗадачи
type: list
title: Просроченные задачи
params:
  Сегодня: "{{today}}"
query: |
  ВЫБРАТЬ Тема, Исполнитель, Дедлайн
  ИЗ Документ.ЗадачаCRM
  ГДЕ Дедлайн < &Сегодня
    И Статус <> 'Завершена'
    И Статус <> 'Отменена'
  УПОРЯДОЧИТЬ ПО Дедлайн
limit: 20
columns:
  - field: Тема
    label: Задача
  - field: Исполнитель
    label: Исполнитель
  - field: Дедлайн
    label: Дедлайн
    format: date
