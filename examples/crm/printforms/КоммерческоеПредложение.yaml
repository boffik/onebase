name: КоммерческоеПредложение
document: КоммерческоеПредложение
title: "Коммерческое предложение № {{Номер}} от {{Дата | date}}"
header: |
  **Клиент**: {{Клиент.Наименование}}

  **Контактное лицо**: {{КонтактноеЛицо.Наименование}}

  **Ответственный**: {{Ответственный.Наименование}}

  **Действительно до**: {{ДатаДействияДо | date}}

table:
  source: Строки
  columns:
    - field: "@row"
      label: "№"
      width: 40px
    - field: Номенклатура
      label: Наименование
    - field: Количество
      label: Кол-во
      align: right
    - field: Цена
      label: Цена
      align: right
      format: "number:2"
    - field: Скидка
      label: "Скидка, %"
      align: right
    - field: Сумма
      label: Сумма
      align: right
      format: "number:2"
  totals:
    - field: Сумма
      sum: true
      label: "Итого"

footer: |
  ___

  **Сумма без скидки**: {{СуммаБезСкидки | money}} руб.

  **Скидка**: {{Скидка}}%

  **Итого со скидкой**: {{СуммаСоСкидкой | money}} руб.

  ___

  С уважением, {{Ответственный.Наименование}}
