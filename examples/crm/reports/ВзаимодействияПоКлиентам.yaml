name: ВзаимодействияПоКлиентам
title: Взаимодействия по клиентам
params:
  - name: Клиент
    type: reference:Клиент
    label: Клиент
  - name: Начало
    type: date
    label: "С даты"
  - name: Конец
    type: date
    label: "По дату"
query: |
  ВЫБРАТЬ
    Клиент,
    ТипАктивности,
    КОЛИЧЕСТВО(*) КАК КоличествоВзаимодействий,
    СУММА(ДлительностьМинут) КАК ОбщаяДлительностьМин
  ИЗ РегистрНакопления.Взаимодействия
  ГДЕ (&Клиент ЕСТЬ ПУСТО ИЛИ Клиент = &Клиент)
    И (&Начало ЕСТЬ ПУСТО ИЛИ period >= &Начало)
    И (&Конец ЕСТЬ ПУСТО ИЛИ period <= &Конец)
  СГРУППИРОВАТЬ ПО Клиент, ТипАктивности
  УПОРЯДОЧИТЬ ПО КоличествоВзаимодействий УБЫВ
