# Конфиг golangci-lint (план 56, этап 2).
#
# Стратегия — прогрессивное ужесточение: включено то, что проходит на текущем
# коде (CI остаётся зелёным), остальное включается по мере чистки baseline.
# Снимок находок на 2026-06-10 (golangci-lint 2.12.2, дефолтный набор):
#   errcheck: 50, staticcheck: 27, unused: 24 — план чистки в Plans/56.
# После чистки соответствующего линтера — переносить его в enable.
version: "2"

linters:
  default: none
  enable:
    - govet
    - ineffassign
  # очередь на включение (см. выше): errcheck, staticcheck, unused, gosec, bodyclose

run:
  timeout: 10m
